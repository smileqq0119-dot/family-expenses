<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家用記帳</title>
<meta name="apple-mobile-web-app-title" content="家用記帳">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f3ef;max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh}
.header{background:#fff;padding:20px 20px 0;border-bottom:1px solid #e8e4de}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header-title-sub{font-size:12px;color:#999;letter-spacing:1px}
.header-title{font-size:20px;font-weight:700;color:#2d2d2d}
.badge{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;background:#fef3cd;border:1px solid #f5c842;color:#856404}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;font-family:sans-serif}
.tab.active{font-weight:700;color:#3d6b57;border-bottom:2px solid #3d6b57}
.page{padding:16px;display:none}
.page.active{display:block}
.months{display:flex;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;gap:8px}
.month-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer;font-family:sans-serif}
.month-btn.active{background:#3d6b57;color:#fff;border-color:#3d6b57}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.card-dark{background:#2d2d2d;border-radius:14px;padding:16px;margin-bottom:16px}
.card-label{font-size:11px;color:#999;margin-bottom:4px}
.card-label-dark{font-size:11px;color:#aaa;margin-bottom:4px}
.card-value-green{font-size:22px;font-weight:700;color:#3d6b57}
.card-value-blue{font-size:22px;font-weight:700;color:#5a7fa8}
.card-value-white{font-size:28px;font-weight:700;color:#fff}
.card-sub{font-size:12px;color:#888;margin-top:4px}
.section-title{font-size:13px;font-weight:600;color:#2d2d2d;margin-bottom:12px}
.bar-row{margin-bottom:10px}
.bar-labels{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-track{height:4px;background:#f0ede8;border-radius:2px}
.bar-fill{height:4px;background:#3d6b57;border-radius:2px}
.expense-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0ede8}
.expense-name{font-weight:600;font-size:14px;color:#2d2d2d}
.expense-meta{font-size:11px;color:#bbb;margin-top:2px}
.expense-amount{font-weight:700;color:#2d2d2d;font-size:15px}
.del-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:16px;padding:0 4px;font-family:sans-serif}
.add-btn{width:100%;padding:13px;border-radius:12px;border:2px dashed #b8d4c2;background:#f0f7f3;color:#3d6b57;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px;font-family:sans-serif}
.empty{text-align:center;color:#bbb;padding:20px;font-size:13px}
/* 繳費清單 */
.checklist-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f0ede8;cursor:pointer}
.checklist-row:last-child{border-bottom:none}
.checklist-left{display:flex;align-items:center;gap:12px}
.check-box{width:24px;height:24px;border-radius:6px;border:2px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff}
.check-box.done{background:#3d6b57;border-color:#3d6b57}
.checklist-name{font-size:15px;font-weight:600;color:#2d2d2d}
.checklist-name.done{color:#aaa;text-decoration:line-through}
.checklist-sub{font-size:11px;color:#3d6b57;margin-top:2px}
.checklist-sub.pending{color:#bbb}
.checklist-amt{font-size:15px;font-weight:600;color:#2d2d2d}
.checklist-amt.done{color:#aaa}
/* 帳單設定 */
.bill-card{width:100%;background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid transparent;text-align:left;cursor:pointer;font-family:sans-serif;display:block}
.bill-card.urgent{border-color:#f5c842}
.bill-top{display:flex;justify-content:space-between;align-items:flex-start}
.bill-left{display:flex;align-items:center;gap:10px}
.bill-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bill-name{font-weight:600;font-size:15px;color:#2d2d2d}
.bill-sub{font-size:11px;color:#aaa;margin-top:2px}
.bill-right{text-align:right}
.bill-amount{font-weight:700;font-size:16px;color:#2d2d2d}
.bill-days{font-size:11px;margin-top:2px;color:#bbb}
.bill-days.urgent{color:#856404;font-weight:600}
.bill-split-row{margin-top:10px;padding:8px 10px;background:#f0f5fa;border-radius:8px;display:flex;justify-content:space-between}
.bill-split-text{font-size:11px;color:#5a7fa8}
/* 結算 */
.settle-card{border-radius:14px;padding:16px;margin-bottom:16px;border:1.5px solid}
.settle-pending{background:#fff8ec;border-color:#f5c842}
.settle-done{background:#f0f7f3;border-color:#b8d4c2}
.settle-neutral{background:#fff;border-color:#e8e4de}
.settle-title{font-size:13px;font-weight:600;margin-bottom:8px;color:#2d2d2d}
.settle-amount{font-size:24px;font-weight:700;color:#3d6b57;margin-bottom:4px}
.settle-desc{font-size:12px;color:#888;margin-bottom:12px;line-height:1.6}
.settle-btn{padding:11px 20px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:sans-serif;background:#3d6b57;color:#fff}
.settle-history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0ede8;font-size:13px}
/* 通用 */
.fab{position:fixed;bottom:90px;right:20px;width:52px;height:52px;border-radius:50%;background:#3d6b57;color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(61,107,87,0.35);display:flex;align-items:center;justify-content:center;font-family:sans-serif}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:24px 20px 36px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#2d2d2d;margin-bottom:20px}
.field-label{font-size:11px;color:#999;font-weight:600;margin-bottom:6px;text-transform:uppercase}
.inp{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid #e0dbd4;font-size:14px;margin-bottom:14px;background:#faf9f7;font-family:sans-serif;display:block}
.pay-btns{display:flex;gap:8px;margin-bottom:14px}
.pay-btn{flex:1;padding:9px;border-radius:9px;border:1.5px solid #e0dbd4;background:#fff;color:#888;cursor:pointer;font-size:13px;font-family:sans-serif}
.pay-btn.active{border-color:#3d6b57;background:#f0f7f3;color:#3d6b57;font-weight:600}
.check-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:13px;color:#555}
.btn-primary{width:100%;padding:14px;background:#3d6b57;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:sans-serif;margin-top:4px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e8e4de;display:flex}
.nav-btn{flex:1;padding:10px 0 14px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:sans-serif}
.nav-btn .nav-icon{font-size:20px}
.nav-btn .nav-label{font-size:10px;color:#aaa}
.nav-btn.active .nav-label{color:#3d6b57;font-weight:700}
.more-btn{width:100%;margin-top:8px;padding:8px;background:none;border:1px solid #e8e4de;border-radius:8px;color:#888;font-size:12px;cursor:pointer;font-family:sans-serif}
.unset{color:#ccc;font-size:12px}
.divider-label{font-size:12px;color:#999;font-weight:600;margin:16px 0 10px;padding-left:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title-sub">家用記帳</div>
      <div class="header-title">伃 &amp; 絜</div>
    </div>
    <div id="urgentBadge" class="badge" style="display:none"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">總覽</button>
    <button class="tab" onclick="switchTab('expenses')">記帳</button>
    <button class="tab" onclick="switchTab('bills')">帳單設定</button>
    <button class="tab" onclick="switchTab('settle')">結算</button>
  </div>
</div>

<!-- 總覽 -->
<div id="page-overview" class="page active">
  <div class="months" id="monthsOverview"></div>
  <div id="settleReminderOverview"></div>
  <div class="grid2">
    <div class="card"><div class="card-label">本月 伃 負擔</div><div class="card-value-green" id="totalYu">NT$ 0</div></div>
    <div class="card"><div class="card-label">本月 絜 負擔</div><div class="card-value-blue" id="totalSis">NT$ 0</div></div>
  </div>
  <div class="card-dark">
    <div class="card-label-dark">本月家庭總支出</div>
    <div class="card-value-white" id="totalMonth">NT$ 0</div>
    <div class="card-sub" id="totalCount">0 筆支出</div>
  </div>
  <div class="card" id="categoryBreakdown" style="display:none"></div>
  <div class="card">
    <div class="section-title">最近紀錄</div>
    <div id="recentList"></div>
    <button class="more-btn" id="moreBtn" style="display:none" onclick="switchTab('expenses')">查看全部 →</button>
  </div>
</div>

<!-- 記帳 -->
<div id="page-expenses" class="page">
  <div class="months" id="monthsExpenses"></div>
  <!-- 固定費用清單 -->
  <div class="card" id="paymentChecklist"></div>
  <!-- 其他支出 -->
  <div class="divider-label">其他支出</div>
  <button class="add-btn" onclick="openAddModal()">＋ 新增其他支出</button>
  <div id="expenseList"></div>
</div>

<!-- 帳單設定 -->
<div id="page-bills" class="page">
  <div style="font-size:12px;color:#888;margin-bottom:16px;line-height:1.6">點擊帳單可設定金額與到期日，7 天內到期會出現警示。</div>
  <div id="billList"></div>
</div>

<!-- 結算 -->
<div id="page-settle" class="page">
  <div style="font-size:12px;color:#888;margin-bottom:16px;line-height:1.6">每雙月 15 日提醒結算，絜將水費 + 電費各一半轉給伃。</div>
  <div id="settleCurrentCard"></div>
  <div id="settleHistory"></div>
</div>

<button class="fab" id="fab" onclick="openAddModal()">＋</button>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('overview')"><span class="nav-icon">📊</span><span class="nav-label">總覽</span></button>
  <button class="nav-btn" onclick="switchTab('expenses')"><span class="nav-icon">📝</span><span class="nav-label">記帳</span></button>
  <button class="nav-btn" onclick="switchTab('bills')"><span class="nav-icon">🔔</span><span class="nav-label">帳單</span></button>
  <button class="nav-btn" onclick="switchTab('settle')"><span class="nav-icon">💸</span><span class="nav-label">結算</span></button>
</div>

<!-- 新增其他支出 Modal -->
<div class="modal-bg" id="addModal" onclick="closeModal('addModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">新增其他支出</div>
    <div class="field-label">日期</div>
    <input type="date" id="formDate" class="inp">
    <div class="field-label">項目名稱</div>
    <input type="text" id="formCategory" class="inp" placeholder="例：清潔用品">
    <div class="field-label">金額（NT$）</div>
    <input type="number" id="formAmount" class="inp" placeholder="0">
    <div class="field-label">由誰支付</div>
    <div class="pay-btns">
      <button class="pay-btn active" id="payYu" onclick="setPayer('伃')">伃 付</button>
      <button class="pay-btn" id="paySis" onclick="setPayer('絜')">絜 付</button>
    </div>
    <div class="check-row">
      <input type="checkbox" id="formSplit" checked style="width:16px;height:16px;accent-color:#3d6b57">
      <label for="formSplit">兩人平分（結算時計入）</label>
    </div>
    <div class="field-label">備註（選填）</div>
    <input type="text" id="formNote" class="inp" placeholder="備註">
    <button class="btn-primary" onclick="addExpense()">儲存</button>
  </div>
</div>

<!-- 繳費 Modal -->
<div class="modal-bg" id="payModal" onclick="closeModal('payModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="payModalTitle">繳費</div>
    <div class="field-label">帳單金額（NT$）</div>
    <input type="number" id="payAmount" class="inp" placeholder="收到帳單後輸入">
    <div id="payDateSection">
      <div class="field-label">繳費日期</div>
      <input type="date" id="payDate" class="inp">
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button onclick="saveAmount()" style="flex:1;padding:13px;border-radius:12px;border:1.5px solid #3d6b57;background:#fff;color:#3d6b57;font-size:14px;font-weight:600;cursor:pointer;font-family:sans-serif">儲存金額</button>
      <button onclick="confirmPay()" style="flex:1;padding:13px;border-radius:12px;border:none;background:#3d6b57;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:sans-serif">✓ 確認已繳</button>
    </div>
  </div>
</div>

<!-- 編輯帳單 Modal -->
<div class="modal-bg" id="billModal" onclick="closeModal('billModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="billModalTitle">編輯帳單</div>
    <div class="field-label">預設金額（NT$）</div>
    <input type="number" id="billAmount" class="inp" placeholder="0">
    <div class="field-label">每月幾日到期</div>
    <input type="number" id="billDay" class="inp" placeholder="15">
    <div class="field-label">週期</div>
    <select id="billCycle" class="inp">
      <option value="monthly">每月</option>
      <option value="bimonthly">每兩個月</option>
    </select>
    <div class="check-row">
      <input type="checkbox" id="billSplit" style="width:16px;height:16px;accent-color:#3d6b57">
      <label for="billSplit">兩人平分</label>
    </div>
    <button class="btn-primary" onclick="saveBill()">儲存</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBjw47bTQQd0-nfb46CGQEPpRiCDJSVqsc",
  authDomain: "family-expenses-19606.firebaseapp.com",
  projectId: "family-expenses-19606",
  storageBucket: "family-expenses-19606.appspot.com",
  messagingSenderId: "251911704153",
  appId: "1:251911704153:web:126c17c65e9e4b8e8b4f2a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULT_BILLS = [
  {id:"b1", name:"管理費", amount:"", cycle:"monthly", splitWith:false, day:5, color:"#7c9e87"},
  {id:"b2", name:"天然氣", amount:"", cycle:"monthly", splitWith:false, day:10, color:"#7c9e87"},
  {id:"b3", name:"水費",   amount:"", cycle:"bimonthly", splitWith:true, day:15, color:"#8fa8c8"},
  {id:"b4", name:"電費",   amount:"", cycle:"bimonthly", splitWith:true, day:15, color:"#8fa8c8"},
];

// 每月固定項目（單月：管理費+天然氣，雙月：管理費+水費+電費）
function getFixedItems(ym) {
  const m = parseInt(ym.split("-")[1]);
  const isEven = m % 2 === 0;
  if (isEven) {
    return [
      {name:"管理費", billId:"b1", tag:"固定"},
      {name:"水費",   billId:"b3", tag:"平分"},
      {name:"電費",   billId:"b4", tag:"平分"},
    ];
  } else {
    return [
      {name:"管理費", billId:"b1", tag:"固定"},
      {name:"天然氣", billId:"b2", tag:"固定"},
    ];
  }
}

let expenses = [];
let bills = [...DEFAULT_BILLS];
let settlements = [];
let currentMonth = getCurrentMonth();
let currentPayer = "伃";
let editingBillId = null;
let payingItem = null; // {name, billId, ym}

function getCurrentMonth() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
}
function getTodayStr() { return new Date().toISOString().slice(0,10); }
function formatMonth(ym) {
  const [y,m] = ym.split("-");
  return `${y}年${parseInt(m)}月`;
}
function getDaysUntil(day) {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), day);
  if (target < now) target.setMonth(target.getMonth()+1);
  return Math.ceil((target-now)/(1000*60*60*24));
}
function n(x) { return Number(x)||0; }
function isEvenMonth(ym) { return parseInt(ym.split("-")[1]) % 2 === 0; }
function calcSettle(ym) {
  // 固定費用：水費+電費（雙月才有，伃先付，絜付一半給伃）
  const fixed = expenses.filter(e => e.date?.startsWith(ym) && e.fixed && e.paid);
  const water = fixed.filter(e=>e.category==="水費").reduce((s,e)=>s+n(e.amount),0);
  const elec  = fixed.filter(e=>e.category==="電費").reduce((s,e)=>s+n(e.amount),0);
  const fixedAmt = Math.round((water+elec)/2); // 絜欠伃（雙月才有）

  // 其他平分支出（每月都算）
  const others = expenses.filter(e => e.date?.startsWith(ym) && !e.fixed && e.split);
  let yuOwes = 0;   // 伃欠絜（絜付的平分）
  let sisOwes = 0;  // 絜欠伃（伃付的平分）
  others.forEach(e => {
    const half = Math.round(n(e.amount)/2);
    if (e.paidBy==="伃") sisOwes += half;
    else if (e.paidBy==="絜") yuOwes += half;
  });

  // 最終：正數=絜欠伃，負數=伃欠絜
  const net = fixedAmt + sisOwes - yuOwes;
  return { net, fixedAmt, sisOwes, yuOwes, water, elec };
}

function calcSettleAmount(ym) {
  return calcSettle(ym).net;
}

// Firebase
db.collection("expenses").onSnapshot(snap => {
  expenses = snap.docs.map(d => ({id:d.id,...d.data()}));
  expenses.sort((a,b) => (b.date||"").localeCompare(a.date||""));
  render();
  if (currentTab === "expenses") { renderChecklist(currentMonth); renderExpenses(); }
});
db.collection("bills").onSnapshot(snap => {
  if (snap.docs.length > 0) {
    bills = snap.docs.map(d => ({id:d.id,...d.data()}));
    bills.sort((a,b) => a.id.localeCompare(b.id));
  } else {
    DEFAULT_BILLS.forEach(b => db.collection("bills").doc(b.id).set(b));
  }
  renderBills();
  updateUrgentBadge();
});
db.collection("settlements").onSnapshot(snap => {
  settlements = snap.docs.map(d => ({id:d.id,...d.data()}));
  settlements.sort((a,b) => (b.month||"").localeCompare(a.month||""));
  renderSettle();
  render();
});

// Tab
let currentTab = "overview";
const tabList = ["overview","expenses","bills","settle"];
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-"+tab).classList.add("active");
  document.querySelectorAll(".tab")[tabList.indexOf(tab)].classList.add("active");
  document.querySelectorAll(".nav-btn")[tabList.indexOf(tab)].classList.add("active");
  document.getElementById("fab").style.display = tab==="expenses" ? "flex" : "none";
  if (tab==="overview" || tab==="expenses") renderMonths();
  if (tab==="expenses") { renderChecklist(currentMonth); renderExpenses(); }
  if (tab==="bills") renderBills();
  if (tab==="settle") renderSettle();
}

function getMonths() {
  const ms = [...new Set(expenses.map(e => e.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  if (!ms.includes(getCurrentMonth())) ms.unshift(getCurrentMonth());
  return ms;
}
function renderMonths() {
  const months = getMonths();
  ["monthsOverview","monthsExpenses"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = months.slice(0,6).map(m =>
      `<button class="month-btn${m===currentMonth?" active":""}" onclick="setMonth('${m}')">${formatMonth(m)}</button>`
    ).join("");
  });
}
function setMonth(m) {
  currentMonth = m;
  renderMonths();
  render();
  if (currentTab==="expenses") { renderChecklist(m); renderExpenses(); }
}

// 繳費清單
function renderChecklist(ym) {
  const el = document.getElementById("paymentChecklist");
  if (!el) return;
  const items = getFixedItems(ym);
  const monthExp = expenses.filter(e => e.date?.startsWith(ym) && e.fixed);

  el.innerHTML = `<div class="section-title">${formatMonth(ym)} 固定繳費</div>` +
    items.map(item => {
      const bill = bills.find(b => b.id===item.billId);
      const paid = monthExp.find(e => e.category===item.name && e.paid===true);
      const isDone = !!paid;
      const tagColor = item.tag==="平分" ? "#5a7fa8" : "#7c9e87";
      const tagBg = item.tag==="平分" ? "#e8f0fa" : "#e8f3ee";
      // 三種狀態：未設定金額 / 有金額待繳 / 已繳
      const pending = monthExp.find(e => e.category===item.name && !e.paid);
      const hasPaid = !!paid;
      const hasAmount = hasPaid || !!pending || !!(bill?.amount);

      const amtDisplay = hasPaid
        ? `NT$ ${n(paid.amount).toLocaleString()}`
        : pending
          ? `NT$ ${n(pending.amount).toLocaleString()}`
          : (bill?.amount ? `NT$ ${n(bill.amount).toLocaleString()}` : "");

      const subText = hasPaid
        ? `${paid.date.slice(5).replace("-","/")} 已繳 ✓`
        : pending
          ? "待繳費"
          : "點擊輸入金額";

      const subColor = hasPaid ? "#3d6b57" : pending ? "#f5a623" : "#bbb";
      const checkDone = hasPaid ? " done" : "";
      const checkContent = hasPaid ? "✓" : "";
      const onclick = hasPaid
        ? `cancelPay('${paid.id}')`
        : `openPayModal('${item.name}','${item.billId}','${ym}',${pending ? `'${pending.id}'` : "null"},${n(pending?.amount||bill?.amount||0)})`;

      return `<div class="checklist-row" onclick="${onclick}">
        <div class="checklist-left">
          <div class="check-box${checkDone}">${checkContent}</div>
          <div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="checklist-name${hasPaid?" done":""}">${item.name}</span>
              <span style="font-size:10px;background:${tagBg};color:${tagColor};padding:1px 6px;border-radius:4px">${item.tag}</span>
            </div>
            <div style="font-size:11px;margin-top:2px;color:${subColor}">${subText}</div>
          </div>
        </div>
        <div class="checklist-amt${hasPaid?" done":""}">${amtDisplay}</div>
      </div>`;
    }).join("");
}

function openPayModal(name, billId, ym, pendingId, existingAmt) {
  payingItem = {name, billId, ym, pendingId};
  document.getElementById("payModalTitle").textContent = `${name} 繳費`;
  document.getElementById("payAmount").value = existingAmt || "";
  document.getElementById("payDate").value = getTodayStr();
  document.getElementById("payModal").classList.add("open");
}

function saveAmount() {
  if (!payingItem) return;
  const amount = parseFloat(document.getElementById("payAmount").value);
  if (!amount||isNaN(amount)) { alert("請輸入金額"); return; }
  const bill = bills.find(b => b.id===payingItem.billId);
  
  // 如果有 pending 紀錄先刪掉再新增
  const doAdd = () => {
    db.collection("expenses").add({
      date: getTodayStr(),
      category: payingItem.name,
      amount, paidBy:"伃",
      split: bill?.splitWith||false,
      note:"", fixed:true, paid:false
    });
  };
  
  if (payingItem.pendingId) {
    db.collection("expenses").doc(payingItem.pendingId).delete().then(doAdd);
  } else {
    doAdd();
  }
  closeModal("payModal");
}

function confirmPay() {
  if (!payingItem) return;
  const amount = parseFloat(document.getElementById("payAmount").value);
  if (!amount||isNaN(amount)) { alert("請輸入金額"); return; }
  const payDate = document.getElementById("payDate").value;
  const bill = bills.find(b => b.id===payingItem.billId);
  
  const doAdd = () => {
    db.collection("expenses").add({
      date: payDate,
      category: payingItem.name,
      amount, paidBy:"伃",
      split: bill?.splitWith||false,
      note:"", fixed:true, paid:true
    });
    // 同步更新帳單預設金額
    if (bill) db.collection("bills").doc(payingItem.billId).set({...bill, amount:String(amount)});
  };
  
  if (payingItem.pendingId) {
    db.collection("expenses").doc(payingItem.pendingId).delete().then(doAdd);
  } else {
    doAdd();
  }
  closeModal("payModal");
}

function cancelPay(id) {
  if (confirm("取消這筆繳費紀錄？")) {
    db.collection("expenses").doc(id).delete();
  }
}

// 其他支出
function renderExpenses() {
  const me = expenses.filter(e => e.date?.startsWith(currentMonth) && !e.fixed);
  const el = document.getElementById("expenseList");
  if (me.length===0) {
    el.innerHTML = `<div class="empty">本月尚無其他支出</div>`;
  } else {
    el.innerHTML = me.map(e => `
      <div class="expense-row">
        <div style="flex:1">
          <div class="expense-name">${e.category}${e.split?` <span style="font-size:10px;background:#e8f0fa;color:#5a7fa8;padding:2px 6px;border-radius:4px">平分</span>`:""}</div>
          <div class="expense-meta">${e.date} · ${e.paidBy} 付${e.note?" · "+e.note:""}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="expense-amount">NT$ ${n(e.amount).toLocaleString()}</span>
          <button class="del-btn" onclick="deleteExpense('${e.id}')">×</button>
        </div>
      </div>`).join("");
  }
}

// 總覽
function render() {
  const me = expenses.filter(e => e.date?.startsWith(currentMonth));
  const totalYu = me.filter(e=>e.paidBy==="伃"&&!e.split).reduce((s,e)=>s+n(e.amount),0)
    + me.filter(e=>e.split).reduce((s,e)=>s+n(e.amount)/2,0);
  const totalSis = me.filter(e=>e.paidBy==="絜"&&!e.split).reduce((s,e)=>s+n(e.amount),0)
    + me.filter(e=>e.split).reduce((s,e)=>s+n(e.amount)/2,0);
  const total = me.reduce((s,e)=>s+n(e.amount),0);

  document.getElementById("totalYu").textContent = "NT$ "+totalYu.toLocaleString();
  document.getElementById("totalSis").textContent = "NT$ "+totalSis.toLocaleString();
  document.getElementById("totalMonth").textContent = "NT$ "+total.toLocaleString();
  document.getElementById("totalCount").textContent = me.length+" 筆支出";

  const cats = ["管理費","天然氣","水費","電費"];
  const breakdown = document.getElementById("categoryBreakdown");
  const catRows = cats.map(cat => ({cat, ct:me.filter(e=>e.category===cat).reduce((s,e)=>s+n(e.amount),0)})).filter(x=>x.ct>0);
  if (catRows.length===0) { breakdown.style.display="none"; }
  else {
    breakdown.style.display="block";
    breakdown.innerHTML = `<div class="section-title">分項支出</div>` + catRows.map(({cat,ct})=>{
      const pct = total ? Math.round(ct/total*100) : 0;
      return `<div class="bar-row">
        <div class="bar-labels"><span style="color:#555">${cat}</span><span style="font-weight:600;color:#2d2d2d">NT$ ${ct.toLocaleString()} <span style="color:#bbb;font-weight:400">(${pct}%)</span></span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join("");
  }

  // 結算提醒
  const now = new Date();
  const cm = getCurrentMonth();
  const reminderEl = document.getElementById("settleReminderOverview");
  if (now.getDate() >= 15) {
    const existing = settlements.find(s=>s.month===cm);
    const s = calcSettle(cm);
    if (!existing && s.net !== 0) {
      const absAmt = Math.abs(s.net);
      const who = s.net>=0 ? "絜轉給伃" : "伃轉給絜";
      reminderEl.innerHTML = `<div class="settle-card settle-pending" style="margin-bottom:16px">
        <div class="settle-title">💸 本月結算提醒</div>
        <div class="settle-amount">NT$ ${absAmt.toLocaleString()}</div>
        <div class="settle-desc">${who}</div>
        <button class="settle-btn" onclick="switchTab('settle')">前往結算 →</button>
      </div>`;
    } else if (existing && existing.confirmed) {
      reminderEl.innerHTML = `<div class="settle-card settle-done" style="margin-bottom:16px"><div style="font-size:13px;color:#3d6b57;font-weight:600">✓ 本月已結清</div></div>`;
    } else { reminderEl.innerHTML=""; }
  } else { reminderEl.innerHTML=""; }

  // 最近紀錄
  const recentList = document.getElementById("recentList");
  const moreBtn = document.getElementById("moreBtn");
  if (me.length===0) {
    recentList.innerHTML = `<div class="empty">本月尚無支出紀錄</div>`;
    moreBtn.style.display="none";
  } else {
    recentList.innerHTML = me.slice(0,5).map(e=>`
      <div class="expense-row">
        <div style="flex:1">
          <div class="expense-name">${e.category}</div>
          <div class="expense-meta">${e.date} · ${e.paidBy} 付</div>
        </div>
        <span class="expense-amount">NT$ ${n(e.amount).toLocaleString()}</span>
      </div>`).join("");
    moreBtn.style.display = me.length>5 ? "block" : "none";
    moreBtn.textContent = `查看全部 ${me.length} 筆 →`;
  }
  renderMonths();
}

// 帳單設定
function renderBills() {
  const el = document.getElementById("billList");
  if (!el) return;
  el.innerHTML = bills.map(bill => {
    const days = getDaysUntil(bill.day);
    const urgent = days<=7;
    const splitRow = bill.splitWith && bill.amount
      ? `<div class="bill-split-row"><span class="bill-split-text">伃 NT$ ${Math.round(n(bill.amount)/2).toLocaleString()}</span><span class="bill-split-text">絜 NT$ ${Math.round(n(bill.amount)/2).toLocaleString()}</span></div>` : "";
    return `<button class="bill-card${urgent?" urgent":""}" onclick="openBillModal('${bill.id}')">
      <div class="bill-top">
        <div class="bill-left">
          <div class="bill-dot" style="background:${bill.color}"></div>
          <div>
            <div class="bill-name">${bill.name}</div>
            <div class="bill-sub">${bill.cycle==="monthly"?"每月":"每兩個月"} · 每月 ${bill.day} 日</div>
          </div>
        </div>
        <div class="bill-right">
          <div class="bill-amount">${bill.amount?`NT$ ${n(bill.amount).toLocaleString()}`:`<span class="unset">未設定</span>`}</div>
          <div class="bill-days${urgent?" urgent":""}">${urgent?`⚠️ ${days} 天後到期`:`${days} 天後到期`}</div>
        </div>
      </div>
      ${splitRow}
    </button>`;
  }).join("");
}

function updateUrgentBadge() {
  const urgent = bills.filter(b=>getDaysUntil(b.day)<=7);
  const badge = document.getElementById("urgentBadge");
  if (urgent.length>0) { badge.style.display="block"; badge.textContent=`⏰ ${urgent.length} 項即將到期`; }
  else { badge.style.display="none"; }
}

// 結算
function renderSettle() {
  const now = new Date();
  const cm = getCurrentMonth();
  const currentEl = document.getElementById("settleCurrentCard");
  const historyEl = document.getElementById("settleHistory");
  if (!currentEl||!historyEl) return;

  const existing = settlements.find(s=>s.month===cm);
  const s = calcSettle(cm);
  const absAmt = Math.abs(s.net);
  const who = s.net>=0 ? "絜轉給伃" : "伃轉給絜";

  if (now.getDate() >= 15) {
    if (!existing) {
      let breakdown = "";
      if (s.water > 0) breakdown += `水費÷2：NT$ ${Math.round(s.water/2).toLocaleString()}<br>`;
      if (s.elec > 0)  breakdown += `電費÷2：NT$ ${Math.round(s.elec/2).toLocaleString()}<br>`;
      if (s.sisOwes > 0) breakdown += `其他（絜付一半）：＋NT$ ${s.sisOwes.toLocaleString()}<br>`;
      if (s.yuOwes > 0)  breakdown += `其他（伃付一半）：－NT$ ${s.yuOwes.toLocaleString()}<br>`;
      if (!breakdown) breakdown = "本月尚無平分項目";
      currentEl.innerHTML = `<div class="settle-card settle-pending">
        <div class="settle-title">💸 ${formatMonth(cm)} 結算</div>
        <div class="settle-amount">NT$ ${absAmt.toLocaleString()}</div>
        <div class="settle-desc">${s.net===0?"本月無需結算":who}<br><br>${breakdown}</div>
        ${s.net!==0 ? `<button class="settle-btn" onclick="confirmSettle('${cm}',${s.net})">✓ 確認收款</button>` : ""}
      </div>`;
    } else if (existing.confirmed) {
      const exAmt = Math.abs(n(existing.amount));
      const exWho = n(existing.amount)>=0 ? "絜轉給伃" : "伃轉給絜";
      currentEl.innerHTML = `<div class="settle-card settle-done">
        <div class="settle-title">✓ ${formatMonth(cm)} 已結清</div>
        <div style="font-size:20px;font-weight:700;color:#3d6b57;margin-bottom:4px">NT$ ${exAmt.toLocaleString()}</div>
        <div style="font-size:12px;color:#888">${exWho}・確認時間：${existing.confirmedAt||""}</div>
      </div>`;
    }
  } else {
    // 還沒到15號，顯示預覽
    currentEl.innerHTML = `<div class="settle-card settle-neutral">
      <div class="settle-title">📅 ${formatMonth(cm)} 結算預覽</div>
      <div style="font-size:20px;font-weight:700;color:#2d2d2d;margin:8px 0 4px">NT$ ${absAmt.toLocaleString()}</div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">${s.net===0?"本月暫無平分項目":who}（15 日後可確認）</div>
      <div style="font-size:11px;color:#bbb">距 15 日還有 ${15-now.getDate()} 天</div>
    </div>`;
  }

  const past = settlements.filter(s=>s.month!==cm&&s.confirmed);
  historyEl.innerHTML = past.length>0 ? `<div class="card">
    <div class="section-title">結算紀錄</div>
    ${past.map(s=>`<div class="settle-history-row">
      <span style="color:#555">${formatMonth(s.month)}</span>
      <span style="font-weight:600;color:#2d2d2d">NT$ ${n(s.amount).toLocaleString()} <span style="color:#3d6b57;font-size:11px">✓ 已結清</span></span>
    </div>`).join("")}
  </div>` : "";
}

function confirmSettle(month, amount) {
  const now = new Date();
  db.collection("settlements").doc(month).set({
    month, amount, confirmed:true,
    confirmedAt:`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`
  });
}

// 通知
function requestNotification() {
  if ("Notification" in window && Notification.permission==="default") Notification.requestPermission();
}
function sendNotification(title, body) {
  if ("Notification" in window && Notification.permission==="granted") new Notification(title,{body});
}
function checkAndNotify() {
  if (Notification.permission!=="granted") return;
  bills.forEach(b => {
    const d = getDaysUntil(b.day);
    if (d<=3) sendNotification(`⏰ ${b.name} 即將到期`,`還有 ${d} 天！`);
    else if (d<=7) sendNotification(`📋 ${b.name} 快到期了`,`${d} 天後到期`);
  });
  const now = new Date();
  const cm = getCurrentMonth();
  if (now.getDate()>=15 && !settlements.find(s=>s.month===cm)) {
    const s = calcSettle(cm);
    if (s.net !== 0) {
      const absAmt = Math.abs(s.net);
      const who = s.net>=0 ? "絜轉給伃" : "伃轉給絜";
      sendNotification(`💸 ${formatMonth(cm)} 結算提醒`,`${who} NT$ ${absAmt.toLocaleString()}`);
    }
  }
}

// 新增其他支出
function openAddModal() {
  document.getElementById("formDate").value = getTodayStr();
  document.getElementById("formAmount").value = "";
  document.getElementById("formCategory").value = "";
  document.getElementById("formNote").value = "";
  document.getElementById("formSplit").checked = false;
  setPayer("伃");
  document.getElementById("addModal").classList.add("open");
}
function setPayer(p) {
  currentPayer = p;
  document.getElementById("payYu").className = "pay-btn"+(p==="伃"?" active":"");
  document.getElementById("paySis").className = "pay-btn"+(p==="絜"?" active":"");
}
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function addExpense() {
  const amount = parseFloat(document.getElementById("formAmount").value);
  if (!amount||isNaN(amount)) return;
  db.collection("expenses").add({
    date: document.getElementById("formDate").value,
    category: document.getElementById("formCategory").value || "其他",
    amount, paidBy: currentPayer,
    split: document.getElementById("formSplit").checked,
    note: document.getElementById("formNote").value,
    fixed: false
  });
  closeModal("addModal");
}
function deleteExpense(id) {
  if (confirm("確定刪除？")) db.collection("expenses").doc(id).delete();
}

// 帳單設定
function openBillModal(id) {
  editingBillId = id;
  const bill = bills.find(b=>b.id===id);
  if (!bill) return;
  document.getElementById("billModalTitle").textContent = "帳單設定："+bill.name;
  document.getElementById("billAmount").value = bill.amount||"";
  document.getElementById("billDay").value = bill.day;
  document.getElementById("billCycle").value = bill.cycle;
  document.getElementById("billSplit").checked = bill.splitWith;
  document.getElementById("billModal").classList.add("open");
}
function saveBill() {
  if (!editingBillId) return;
  const bill = bills.find(b=>b.id===editingBillId);
  db.collection("bills").doc(editingBillId).set({
    ...bill,
    amount: document.getElementById("billAmount").value,
    day: parseInt(document.getElementById("billDay").value),
    cycle: document.getElementById("billCycle").value,
    splitWith: document.getElementById("billSplit").checked
  });
  closeModal("billModal");
}

// 初始化
document.getElementById("formDate").value = getTodayStr();
requestNotification();
render();
renderBills();
setTimeout(checkAndNotify, 3000);
</script>
</body>
</html>
